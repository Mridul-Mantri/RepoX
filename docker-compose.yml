# =============================================================================
#  RepoX local development stack
#
#  Run:
#    cp .env.example .env       # then edit values
#    docker compose up -d       # Postgres + Redis + API
#    npm run prisma:migrate     # first time only
#    npm run prisma:seed        # populate demo data
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: repox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: repox
      POSTGRES_PASSWORD: repox
      POSTGRES_DB: repox
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repox"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: repox-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: repox-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://repox:repox@postgres:5432/repox?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # The following MUST be supplied via .env or your secret manager.
      # docker-compose interpolates ${VAR} from your host env / .env file.
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:3000}
      HOLD_MINUTES: ${HOLD_MINUTES:-10}
    ports:
      - "5000:5000"

volumes:
  postgres-data:
  redis-data:
